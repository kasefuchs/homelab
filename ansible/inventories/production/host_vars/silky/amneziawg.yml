---
amneziawg_config_interface:
  Address: 10.45.20.20/16, fd45:45:45:20::20/48
  ListenPort: 48092
  PrivateKey: "{{ amneziawg_config_private_key }}"
  PostUp: sysctl -w net.ipv4.ip_forward=1; sysctl -w net.ipv6.conf.all.forwarding=1

amneziawg_config_peers:
  # mala
  - PublicKey: "{{ amneziawg_config_public_keys.mala }}"
    PresharedKey: "{{ amneziawg_config_preshared_keys.mala }}"
    AllowedIPs: 10.45.30.16/32, fd45:45:45:30::16/128
    Endpoint: mala.kasefuchs.net:48526

  # lestat
  - PublicKey: "{{ amneziawg_config_public_keys.lestat }}"
    PresharedKey: "{{ amneziawg_config_preshared_keys.lestat }}"
    AllowedIPs: 10.45.20.16/32, fd45:45:45:20::16/128
