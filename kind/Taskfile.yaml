version: 3
includes:
  docker:
    taskfile: docker/Taskfile.yaml
    dir: docker
vars:
  NODES:
    sh: kind get nodes --name homelab
tasks:
  up:
    deps: ["docker:up"]
    cmd: kind create cluster --config cluster.yaml
  down:
    deps: ["docker:down"]
    cmd: kind delete cluster --name homelab
  pause:
    ignore_error: true
    deps: ["docker:pause"]
    cmd:
      for: {var: NODES}
      cmd: docker pause {{.ITEM}}
  unpause:
    ignore_error: true
    deps: ["docker:unpause"]
    cmd:
      for: {var: NODES}
      cmd: docker unpause {{.ITEM}}
