kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: homelab
nodes:
  - role: control-plane
    extraMounts:
      - &containerd-certs-mount
        hostPath: rootfs/node/etc/containerd/certs.d
        containerPath: /etc/containerd/certs.d
        readOnly: true
  - role: worker
    extraMounts: [*containerd-certs-mount]
  - role: worker
    extraMounts: [*containerd-certs-mount]
networking:
  ipFamily: dual
  kubeProxyMode: none
  disableDefaultCNI: true
