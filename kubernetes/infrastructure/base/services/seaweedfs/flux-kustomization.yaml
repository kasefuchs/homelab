---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: seaweedfs-service
  namespace: flux-system
spec:
  interval: 1h
  path: ./kubernetes/infrastructure/base/services/seaweedfs/kustomize
  wait: false
  prune: true
  timeout: 5m
  retryInterval: 2m
  targetNamespace: seaweedfs
  sourceRef:
    kind: GitRepository
    name: flux-system
