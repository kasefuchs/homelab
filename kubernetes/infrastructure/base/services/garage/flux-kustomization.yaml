---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: garage-service
  namespace: flux-system
spec:
  interval: 1h
  path: ./kubernetes/infrastructure/base/services/garage/kustomize
  wait: false
  prune: true
  timeout: 5m
  retryInterval: 2m
  targetNamespace: garage
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cosi-controller
    - name: garage-operator-controller
