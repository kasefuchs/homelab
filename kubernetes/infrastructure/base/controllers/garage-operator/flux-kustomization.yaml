---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: garage-operator-controller
  namespace: flux-system
spec:
  interval: 1h
  path: ./infrastructure/base/controllers/garage-operator/kustomize
  wait: false
  prune: true
  patches: []
  timeout: 5m
  retryInterval: 2m
  targetNamespace: garage-operator-system
  sourceRef:
    kind: OCIRepository
    name: flux-system
  dependsOn:
    - name: cosi-controller
