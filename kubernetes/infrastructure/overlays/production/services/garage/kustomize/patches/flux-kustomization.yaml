---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: garage-service
  namespace: flux-system
spec:
  patches:
    - target:
        group: garage.rajsingh.info
        kind: GarageCluster
        name: garage
      # language="yaml"
      patch: |-
        - op: add
          path: /spec/admin/adminTokenSecretRef
          value:
            name: garage-secret
            key: garage_admin_token
        - op: add
          path: /spec/storage
          value:
            data:
              size: 100Gi
              storageClassName: longhorn-local
            metadata:
              size: 10Gi
              storageClassName: longhorn-local
