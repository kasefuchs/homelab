---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: garage-service-overlay
  namespace: flux-system
spec:
  interval: 1h
  path: ./infrastructure/overlays/production/services/garage/kustomize
  wait: false
  prune: true
  patches: []
  timeout: 5m
  retryInterval: 2m
  sourceRef:
    kind: OCIRepository
    name: flux-system
