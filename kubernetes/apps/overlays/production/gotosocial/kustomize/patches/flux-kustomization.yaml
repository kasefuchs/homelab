---
- op: add
  path: /spec/patches/-
  value:
    target:
      group: helm.toolkit.fluxcd.io
      kind: HelmRelease
      name: gotosocial
    # language="yaml"
    patch: |-
      - op: replace
        path: /spec/values/gotosocial/accountDomain
        value: floof.fans
      - op: replace
        path: /spec/values/gotosocial/host
        value: social.floof.fans
      - op: add
        path: /spec/values/ingress
        value:
          enabled: true
          className: traefik
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt
            external-dns.alpha.kubernetes.io/target: 85.208.85.159
          hosts:
            - host: floof.fans
              paths:
                - path: /.well-known/webfinger
                  pathType: Exact
                - path: /.well-known/host-meta
                  pathType: Exact
                - path: /.well-known/nodeinfo
                  pathType: Exact
            - host: social.floof.fans
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - hosts:
                - floof.fans
                - social.floof.fans
              secretName: gotosocial-tls
