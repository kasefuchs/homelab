---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: woodpecker
spec:
  interval: 1h
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 2m
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 3m
  chartRef:
    kind: OCIRepository
    name: woodpecker
    namespace: flux-system
  values:
    agent:
      enabled: true
      replicaCount: 1
    server:
      enabled: true
      env:
        WOODPECKER_DATABASE_DRIVER: postgres
      persistentVolume:
        enabled: false
  valuesFrom:
    - kind: Secret
      name: woodpecker-db-app
      valuesKey: uri
      targetPath: server.env.WOODPECKER_DATABASE_DATASOURCE
