apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
spec:
  values:
    web:
      ingress:
        enabled: true
        className: traefik
        annotations:
          external-dns.alpha.kubernetes.io/hostname: traefik.homelab.local
        hosts:
          - host: flux.homelab.local
            paths:
              - path: /
                pathType: Prefix
