apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
spec:
  values:
    hubble:
      relay:
        enabled: true
      ui:
        enabled: true
        ingress:
          enabled: true
          className: traefik
          annotations:
            external-dns.alpha.kubernetes.io/hostname: traefik.homelab.local
          hosts:
            - hubble.homelab.local
