apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-dns
  namespace: flux-system
spec:
  path: infrastructure/base/external-dns/kustomize
  wait: false
  prune: true
  timeout: 5m
  interval: 1h
  retryInterval: 2m
  targetNamespace: external-dns
  sourceRef:
    kind: OCIRepository
    name: flux-system
  dependsOn:
    - name: cilium
