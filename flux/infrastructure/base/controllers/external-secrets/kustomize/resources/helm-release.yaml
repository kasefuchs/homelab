---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
spec:
  interval: 1h
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 2m
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 3m
  chart:
    spec:
      chart: external-secrets
      version: 2.0.x
      interval: 2h
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
  values: {}
  valuesFrom: []
