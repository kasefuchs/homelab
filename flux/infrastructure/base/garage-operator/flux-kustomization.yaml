apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: garage-operator
  namespace: flux-system
spec:
  path: infrastructure/base/garage-operator/kustomize
  wait: false
  prune: true
  timeout: 5m
  interval: 1h
  retryInterval: 2m
  targetNamespace: garage-operator-system
  sourceRef:
    kind: OCIRepository
    name: flux-system
  dependsOn:
    - name: cilium
    - name: cert-manager
