---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-config-overlay
  namespace: flux-system
spec:
  interval: 1h
  path: ./infrastructure/overlays/production/configs/cert-manager/kustomize
  wait: false
  prune: true
  patches: []
  timeout: 5m
  retryInterval: 2m
  sourceRef:
    kind: OCIRepository
    name: flux-system
