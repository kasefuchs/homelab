apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: s-ui
  namespace: flux-system
spec:
  path: apps/base/s-ui/kustomize
  wait: false
  prune: true
  timeout: 5m
  interval: 1h
  retryInterval: 2m
  targetNamespace: s-ui
  sourceRef:
    kind: OCIRepository
    name: flux-system
