---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: s-ui
spec:
  interval: 1h
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 2m
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 3m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    global:
      alwaysAppendIdentifierToResourceName: true
    controllers:
      s-ui:
        enabled: true
        type: statefulset
        replicas: 1
        containers:
          main:
            image:
              repository: ghcr.io/alireza0/s-ui
              tag: latest
              pullPolicy: IfNotPresent
            ports:
              - name: panel
                protocol: TCP
                containerPort: 2095
              - name: subscription
                protocol: TCP
                containerPort: 2096
    persistence:
      s-ui-database:
        enabled: true
        type: persistentVolumeClaim
        size: 1Gi
        accessMode: ReadWriteOnce
        storageClass: longhorn-local
        advancedMounts:
          s-ui:
            main:
              - path: /app/db/
    service:
      s-ui:
        enabled: true
        primary: true
        controller: s-ui
        type: ClusterIP
        ports:
          panel:
            enabled: true
            primary: true
            port: 2095
            protocol: HTTP
          subscription:
            enabled: true
            port: 2096
            protocol: HTTP
  valuesFrom: []
