apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
spec:
  interval: 1h
  releaseName: nextcloud
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 2m
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 2m
  chartRef:
    kind: OCIRepository
    name: nextcloud
  values:
    internalDatabase:
      enabled: false
    externalDatabase:
      enabled: true
      type: postgresql
      existingSecret:
        enabled: true
        secretName: nextcloud-db-app
        hostKey: host
        databaseKey: dbname
        usernameKey: user
        passwordKey: password
    nextcloud:
      host: nextcloud.example.com
      objectStore:
        s3:
          enabled: true
          ssl: false
          host: garage.garage.svc.cluster.local
          port: 3900
          region: garage
          bucket: nextcloud
          usePathStyle: true
          existingSecret: nextcloud-garage-key
          secretKeys:
            accessKey: access-key-id
            secretKey: secret-access-key
    redis:
      enabled: false
    externalRedis:
      enabled: true
      host: nextcloud-redis
      port: 6379
    persistence:
      enabled: true
      size: 10Gi
    cronjob:
      enabled: true
    livenessProbe:
      initialDelaySeconds: 60
    readinessProbe:
      initialDelaySeconds: 60
