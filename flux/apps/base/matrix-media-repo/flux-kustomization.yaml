apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: matrix-media-repo
  namespace: flux-system
spec:
  path: apps/base/matrix-media-repo/kustomize
  wait: false
  prune: true
  timeout: 5m
  interval: 1h
  retryInterval: 2m
  targetNamespace: matrix-media-repo
  sourceRef:
    kind: OCIRepository
    name: flux-system
