apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: iceshrimp
  namespace: flux-system
spec:
  path: apps/base/iceshrimp/kustomize
  wait: false
  prune: true
  timeout: 5m
  interval: 1h
  retryInterval: 2m
  targetNamespace: iceshrimp
  sourceRef:
    kind: OCIRepository
    name: flux-system
