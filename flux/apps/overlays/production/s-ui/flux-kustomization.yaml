---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: s-ui-overlay
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/overlays/production/s-ui/kustomize
  wait: false
  prune: true
  patches: []
  timeout: 5m
  retryInterval: 2m
  sourceRef:
    kind: OCIRepository
    name: flux-system
