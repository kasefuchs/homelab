---
- op: add
  path: /spec/patches/-
  value:
    target:
      group: helm.toolkit.fluxcd.io
      kind: HelmRelease
      name: s-ui
    # language="yaml"
    patch: |-
      - op: add
        path: /spec/values/controllers/socks
        value:
          enabled: true
          type: deployment
          replicas: 1
          pod:
            nodeSelector:
              net.kasefuchs.homelab/region: eu
              net.kasefuchs.homelab/placement: cloud
          containers:
            main:
              image:
                repository: serjs/go-socks5-proxy
                tag: v0.0.4
                pullPolicy: IfNotPresent
              env:
                REQUIRE_AUTH: "false"
              ports:
                - name: socks
                  protocol: TCP
                  containerPort: 1080
      - op: add
        path: /spec/values/service/socks
        value:
          enabled: true
          controller: socks
          type: ClusterIP
          ports:
            socks:
              enabled: true
              port: 1080
