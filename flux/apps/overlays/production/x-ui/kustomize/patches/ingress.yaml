---
- op: add
  path: /spec/patches/-
  value:
    target:
      group: helm.toolkit.fluxcd.io
      kind: HelmRelease
      name: x-ui
    # language="yaml"
    patch: |-
      - op: add
        path: /spec/values/ingress
        value:
          main:
            enabled: true
            className: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt
              external-dns.alpha.kubernetes.io/target: silky.kasefuchs.net
            hosts:
              - host: xui.kasefuchs.net
                paths:
                  - path: /
                    pathType: Prefix
                    service:
                      identifier: main
                      port: panel
            tls:
              - hosts:
                  - xui.kasefuchs.net
                secretName: x-ui-tls
