---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: repositories
  namespace: flux-system
spec:
  interval: 10m
  path: ./repositories
  prune: true
  targetNamespace: flux-system
  sourceRef:
    kind: OCIRepository
    name: flux-system
  dependsOn:
    - name: namespaces
