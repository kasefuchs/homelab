---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/overlays/testing
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
  dependsOn:
    - name: namespaces
    - name: repositories
